name: realtime_drawing
description: Multiplayer whiteboard application with real-time collaboration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  socket_io_client: ^2.0.3+1
  http: ^1.2.0
  dio: ^5.4.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Utilities
  uuid: ^4.3.3
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  intl: ^0.19.0
  
  # UI
  flutter_colorpicker: ^1.0.3
  cached_network_image: ^3.3.1
  
  # File handling
  path: ^1.8.3
  image: ^4.1.7
  pdf: ^3.11.0
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

